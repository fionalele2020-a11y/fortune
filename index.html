<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>改命记实录 · 玄机命理馆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dark: #8a6f2e;
    --red: #9b1c1c;
    --red-light: #c0392b;
    --bg: #06060e;
    --bg2: #0e0e1a;
    --bg3: #16162a;
    --bg4: #1e1e30;
    --text: #e8d5a3;
    --text-dim: #a89060;
    --border: rgba(201,168,76,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === 星空背景 === */
  .starfield {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .starfield canvas { width: 100%; height: 100%; }

  /* === 纹样装饰 === */
  .pattern-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px);
    pointer-events: none; z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 0 20px; }

  /* === 页头 === */
  header {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
  }
  .header-deco {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin-bottom: 20px;
  }
  .header-deco .line {
    flex: 1; max-width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .header-deco .line.right { background: linear-gradient(90deg, var(--gold), transparent); }
  .header-deco .yin-yang {
    font-size: 36px; animation: spin 20s linear infinite;
    filter: drop-shadow(0 0 10px var(--gold));
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  header h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.15em;
    text-shadow: none;
    margin-bottom: 12px;
    position: relative;
  }
  header h1::after {
    content: '改命记实录·玄机命理馆';
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    color: var(--gold); opacity: 0.06;
    font-size: 1.5em; white-space: nowrap; pointer-events: none;
  }
  header .subtitle {
    color: var(--text-dim); font-size: 0.95rem; letter-spacing: 0.3em;
  }

  /* === 八卦装饰 === */
  .bagua-row {
    display: flex; justify-content: center; gap: 8px; margin-top: 16px;
    font-size: 1.5rem; color: var(--gold-dark); opacity: 0.6;
    animation: flicker 4s ease-in-out infinite;
  }
  @keyframes flicker {
    0%,100% { opacity: 0.5; }
    50% { opacity: 0.9; }
  }

  /* === 输入卡片 === */
  .input-card {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 44px;
    margin: 0 auto 40px;
    max-width: 700px;
    box-shadow: 0 0 60px rgba(201,168,76,0.08), 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }
  .input-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .input-card::after {
    content: '☯';
    position: absolute; bottom: -20px; right: -10px;
    font-size: 120px; color: var(--gold); opacity: 0.03;
    pointer-events: none;
  }

  .card-title {
    text-align: center; font-size: 1.1rem; letter-spacing: 0.3em;
    color: var(--gold); margin-bottom: 30px;
    display: flex; align-items: center; gap: 12px; justify-content: center;
  }
  .card-title::before, .card-title::after {
    content: '◆'; font-size: 0.5rem; opacity: 0.7;
  }

  .form-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.82rem; color: var(--gold); letter-spacing: 0.15em;
  }
  input, select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    color: var(--text); font-family: inherit; font-size: 0.95rem;
    transition: border-color 0.3s, box-shadow 0.3s;
    outline: none; width: 100%;
  }
  input:focus, select:focus {
    border-color: var(--gold-dark);
    box-shadow: 0 0 12px rgba(201,168,76,0.15);
  }
  select option { background: var(--bg3); }

  .submit-btn {
    display: block; width: 100%; margin-top: 28px;
    padding: 14px;
    background: linear-gradient(135deg, #8a6f2e, var(--gold), #8a6f2e);
    background-size: 200% 100%;
    border: none; border-radius: 8px;
    color: var(--bg); font-family: inherit; font-size: 1.05rem;
    font-weight: 700; letter-spacing: 0.3em; cursor: pointer;
    transition: background-position 0.4s, transform 0.2s, box-shadow 0.3s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }
  .submit-btn:hover {
    background-position: right;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.4);
  }
  .submit-btn:active { transform: translateY(0); }

  /* === 加载动画 === */
  .loading {
    display: none; text-align: center; padding: 60px 20px;
  }
  .loading.show { display: block; }
  .loading-icon {
    font-size: 4rem; animation: spin 2s linear infinite;
    display: block; margin-bottom: 20px;
    filter: drop-shadow(0 0 20px var(--gold));
  }
  .loading p { color: var(--text-dim); letter-spacing: 0.2em; }

  /* === 结果区域 === */
  .results { display: none; }
  .results.show { display: block; }

  .result-header {
    text-align: center; margin-bottom: 40px;
    padding: 30px;
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative; overflow: hidden;
  }
  .result-header::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--red), var(--gold), transparent);
  }
  .result-name {
    font-size: 2rem; color: var(--gold-light);
    letter-spacing: 0.2em; margin-bottom: 8px;
  }
  .result-meta {
    color: var(--text-dim); font-size: 0.85rem; letter-spacing: 0.15em;
    line-height: 2;
  }
  .bazi-display {
    display: flex; justify-content: center; gap: 16px;
    margin: 20px 0; flex-wrap: wrap;
  }
  .pillar {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; text-align: center;
    min-width: 72px;
  }
  .pillar-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 8px; }
  .pillar-stem { font-size: 1.8rem; line-height: 1; margin-bottom: 4px; }
  .pillar-branch { font-size: 1.8rem; line-height: 1; }
  .element-fire { color: #e85c30; }
  .element-wood { color: #4caf50; }
  .element-water { color: #4fc3f7; }
  .element-metal { color: #bdbdbd; }
  .element-earth { color: #c9a84c; }

  /* === 模块标签页 === */
  .tabs {
    display: flex; gap: 8px; margin-bottom: 24px;
    flex-wrap: wrap; justify-content: center;
  }
  .tab-btn {
    padding: 8px 18px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-dim); font-family: inherit;
    font-size: 0.85rem; cursor: pointer; letter-spacing: 0.1em;
    transition: all 0.3s;
  }
  .tab-btn:hover { border-color: var(--gold-dark); color: var(--text); }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--bg3), var(--bg4));
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.15);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* === 分析卡片 === */
  .analysis-card {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border);
    border-radius: 14px; padding: 30px 36px; margin-bottom: 20px;
    position: relative; overflow: hidden;
  }
  .analysis-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .analysis-card-title {
    font-size: 1rem; color: var(--gold); letter-spacing: 0.2em;
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .analysis-card-title .icon { font-size: 1.3rem; }

  .analysis-card p {
    color: var(--text); line-height: 2; font-size: 0.92rem;
    margin-bottom: 12px;
  }
  .analysis-card p:last-child { margin-bottom: 0; }

  /* === 五行图 === */
  .wuxing-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 10px; margin: 16px 0;
  }
  .wuxing-item {
    text-align: center; padding: 14px 8px;
    border-radius: 10px; border: 1px solid;
  }
  .wuxing-item .wuxing-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .wuxing-item .wuxing-count { font-size: 0.75rem; opacity: 0.8; }
  .wuxing-bar-wrap { margin-top: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; height: 4px; overflow: hidden; }
  .wuxing-bar { height: 100%; border-radius: 3px; transition: width 1s ease; }

  .wuxing-fire .wuxing-item { border-color: rgba(232,92,48,0.4); background: rgba(232,92,48,0.08); color: #e85c30; }
  .wuxing-fire .wuxing-bar { background: #e85c30; }
  .wuxing-wood .wuxing-item { border-color: rgba(76,175,80,0.4); background: rgba(76,175,80,0.08); color: #4caf50; }
  .wuxing-wood .wuxing-bar { background: #4caf50; }
  .wuxing-water .wuxing-item { border-color: rgba(79,195,247,0.4); background: rgba(79,195,247,0.08); color: #4fc3f7; }
  .wuxing-water .wuxing-bar { background: #4fc3f7; }
  .wuxing-metal .wuxing-item { border-color: rgba(189,189,189,0.4); background: rgba(189,189,189,0.08); color: #bdbdbd; }
  .wuxing-metal .wuxing-bar { background: #bdbdbd; }
  .wuxing-earth .wuxing-item { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.08); color: #c9a84c; }
  .wuxing-earth .wuxing-bar { background: #c9a84c; }

  /* === 运势评分 === */
  .score-row {
    display: flex; align-items: center; gap: 14px; margin: 10px 0;
  }
  .score-label { min-width: 60px; font-size: 0.85rem; color: var(--text-dim); }
  .score-bar-wrap {
    flex: 1; background: rgba(0,0,0,0.4); border-radius: 4px; height: 8px;
    overflow: hidden;
  }
  .score-bar {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    transition: width 1.2s ease;
  }
  .score-val { min-width: 40px; text-align: right; font-size: 0.85rem; color: var(--gold); }

  /* === 年运表格 === */
  .year-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }
  .year-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; text-align: center;
    transition: border-color 0.3s;
  }
  .year-card:hover { border-color: var(--gold-dark); }
  .year-card .year-num { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; }
  .year-card .year-gz { font-size: 1rem; color: var(--gold); margin-bottom: 6px; }
  .year-card .year-stars { color: var(--red-light); font-size: 0.9rem; }

  /* === 风水方位 === */
  .compass {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 6px; max-width: 300px; margin: 0 auto 20px;
  }
  .compass-cell {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 8px; text-align: center;
    font-size: 0.82rem;
  }
  .compass-cell.center {
    background: linear-gradient(135deg, var(--bg3), var(--bg4));
    border-color: var(--gold-dark);
    color: var(--gold);
  }
  .compass-cell .dir { font-size: 0.7rem; color: var(--text-dim); }
  .compass-cell .luck { font-size: 1.1rem; }
  .compass-cell .good { color: #4caf50; }
  .compass-cell .bad { color: var(--red-light); }
  .compass-cell .neutral { color: var(--text-dim); }

  /* === 吉祥提示 === */
  .tip-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 16px 0;
  }
  .tip-item {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px;
  }
  .tip-item .tip-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 0.1em; }
  .tip-item .tip-value { font-size: 0.9rem; color: var(--gold); }

  /* === 签文 === */
  .qianwen {
    text-align: center; padding: 24px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; margin: 16px 0;
    font-size: 1.05rem; line-height: 2.4;
    color: var(--text-dim);
    font-style: italic;
  }
  .qianwen strong { color: var(--gold); font-style: normal; display: block; margin-bottom: 8px; font-size: 0.8rem; letter-spacing: 0.3em; }

  /* === 分割线 === */
  .divider {
    text-align: center; margin: 20px 0;
    color: var(--gold-dark); font-size: 0.9rem; letter-spacing: 0.5em;
  }

  /* === 页脚 === */
  footer {
    text-align: center; padding: 40px 20px;
    color: var(--text-dim); font-size: 0.8rem;
    border-top: 1px solid var(--border); margin-top: 60px;
    letter-spacing: 0.15em; line-height: 2;
  }

  /* === 响应式 === */
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .input-card { padding: 28px 20px; }
    .analysis-card { padding: 22px 18px; }
    .wuxing-grid { grid-template-columns: repeat(5, 1fr); }
    .tip-grid { grid-template-columns: 1fr; }
  }

  /* ─── 六爻问卦 ─── */
  .liuyao-ask {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 24px;
    margin-bottom: 20px;
    text-align: center;
  }
  .liuyao-ask h3 { color: var(--gold); font-size: 1.1rem; margin-bottom: 6px; letter-spacing: .08em; }
  .liuyao-ask p  { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 18px; }
  .liuyao-question {
    width: 100%; box-sizing: border-box;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px;
    padding: 14px 16px; font-size: 1rem;
    outline: none; resize: none; height: 80px;
    transition: border-color .3s;
  }
  .liuyao-question:focus { border-color: var(--gold); }
  .liuyao-cast-btn {
    margin-top: 16px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #1a1000; border: none; border-radius: 30px;
    padding: 13px 38px; font-size: 1rem; font-weight: 700;
    cursor: pointer; letter-spacing: .1em;
    transition: transform .15s, box-shadow .15s;
  }
  .liuyao-cast-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(199,150,64,.45); }
  .liuyao-cast-btn:active { transform: scale(.97); }
  .liuyao-examples {
    margin-top: 14px;
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .liuyao-example-tag {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 20px;
    padding: 5px 14px; font-size: 0.78rem; cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .liuyao-example-tag:hover { border-color: var(--gold); color: var(--gold); }

  /* coin toss animation */
  .coins-wrap { display: flex; gap: 18px; justify-content: center; margin: 28px 0; }
  .coin {
    width: 52px; height: 52px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--gold) 0%, #7a5310 100%);
    border: 2px solid var(--gold-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; font-weight: 900; color: #1a1000;
    animation: coinSpin 1.4s ease-in-out forwards;
    box-shadow: 0 4px 14px rgba(199,150,64,.4);
  }
  @keyframes coinSpin {
    0%   { transform: rotateY(0deg) scale(1); }
    30%  { transform: rotateY(360deg) scale(1.1); }
    60%  { transform: rotateY(720deg) scale(1); }
    85%  { transform: rotateY(900deg) scale(1.05); }
    100% { transform: rotateY(1080deg) scale(1); }
  }
  .coin:nth-child(2) { animation-delay: .12s; }
  .coin:nth-child(3) { animation-delay: .24s; }

  /* hexagram display */
  .hexagram-pair { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin: 22px 0; }
  .hexagram-box {
    flex: 1; min-width: 160px; max-width: 220px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 16px; text-align: center;
  }
  .hexagram-box.primary { border-color: var(--gold); }
  .hexagram-label { font-size: 0.72rem; color: var(--text-dim); letter-spacing: .06em; margin-bottom: 8px; }
  .hexagram-name  { font-size: 1.15rem; color: var(--gold); font-weight: 700; margin-bottom: 14px; }
  .hex-lines { display: flex; flex-direction: column; gap: 7px; align-items: center; }
  .hex-line { display: flex; align-items: center; gap: 6px; height: 18px; width: 120px; }
  .hex-line-yang { height: 6px; border-radius: 3px; background: var(--text); width: 100%; }
  .hex-line-yin  { display: flex; gap: 12px; width: 100%; }
  .hex-line-yin span { height: 6px; border-radius: 3px; background: var(--text); flex: 1; }
  .hex-moving-yang .hex-line-yang { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  .hex-moving-yin  .hex-line-yin span { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  .hex-line-marker { font-size: 0.8rem; color: var(--gold); font-weight: 900; min-width: 16px; }

  .hexagram-fav { margin: 10px 0 4px; font-size: 1rem; color: var(--gold); }
  .hexagram-keyword {
    display: inline-block; margin-top: 4px;
    border: 1px solid var(--gold); border-radius: 12px;
    padding: 2px 12px; font-size: 0.78rem; color: var(--gold); letter-spacing: .08em;
  }
  .liuyao-section-title {
    font-size: 0.88rem; color: var(--gold); letter-spacing: .06em;
    border-left: 3px solid var(--gold); padding-left: 10px;
    margin: 22px 0 10px;
  }
  .liuyao-yao-list { display: flex; flex-direction: column; gap: 10px; }
  .liuyao-yao-item {
    background: var(--bg3); border-radius: 10px; padding: 12px 16px;
    border-left: 3px solid var(--border);
    font-size: 0.85rem; color: var(--text); line-height: 1.7;
  }
  .liuyao-yao-item.moving { border-left-color: var(--gold); }
  .liuyao-yao-item .yao-num { color: var(--gold); font-weight: 700; font-size: 0.78rem; margin-bottom: 4px; }
  .liuyao-answer {
    background: linear-gradient(135deg, rgba(199,150,64,.08), rgba(199,150,64,.03));
    border: 1px solid rgba(199,150,64,.3); border-radius: 14px;
    padding: 20px 18px; margin-top: 18px; line-height: 1.9;
    font-size: 0.9rem;
  }
  .liuyao-answer strong { color: var(--gold); }
  .liuyao-result { animation: fadeIn 0.7s ease; }
</style>
</head>
<body>

<div class="starfield"><canvas id="starCanvas"></canvas></div>
<div class="pattern-overlay"></div>

<div class="container">

  <!-- 页头 -->
  <header>
    <div class="header-deco">
      <div class="line"></div>
      <div class="yin-yang">☯</div>
      <div class="line right"></div>
    </div>
    <h1>玄机命理馆</h1>

// ============================================================
//  八字计算
// ============================================================
function getYearPillar(year) {
  const si = ((year - 4) % 10 + 10) % 10;
  const bi = ((year - 4) % 12 + 12) % 12;
  return { stem: STEMS[si], branch: BRANCHES[bi], si, bi };
}

function getMonthPillar(year, month) {
  // 月支从寅（索引2）开始，正月=寅
  const bi = (month + 1) % 12; // 简化：1月→2(寅)，2月→3(卯)…
  const yearSi = ((year - 4) % 10 + 10) % 10;
  // 月干根据年干推算：甲己年从丙寅起
  const monthStemBase = [2, 4, 6, 8, 0, 2, 4, 6, 8, 0][yearSi];
  const si = (monthStemBase + (month - 1)) % 10;
  return { stem: STEMS[si], branch: BRANCHES[bi], si, bi };
}

function getDayPillar(year, month, day) {
  const d = new Date(year, month - 1, day);
  const ref = new Date(1900, 0, 31); // 庚子日（甲子=0，庚子=6*10+0=60+0…简化）
  const diff = Math.round((d - ref) / 86400000);
  const si = ((diff % 10) + 10) % 10;
  const bi = ((diff % 12) + 12) % 12;
  return { stem: STEMS[si], branch: BRANCHES[bi], si, bi };
}

function getHourPillar(daySi, hour) {
  const bi = HOUR_BRANCH[hour];
  const hourStemBase = [0, 2, 4, 6, 8][daySi % 5];
  const si = (hourStemBase + bi) % 10;
  return { stem: STEMS[si], branch: BRANCHES[bi], si, bi };
}

function countElements(pillars) {
  const cnt = { '木':0,'火':0,'土':0,'金':0,'水':0 };
  pillars.forEach(p => {
    cnt[STEM_ELEM[p.si]]++;
    cnt[BRANCH_ELEM[p.bi]]++;
  });
  return cnt;
}

function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function pick(arr, rand) { return arr[Math.floor(rand() * arr.length)]; }

function stars(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

function score(rand, base, spread) {

  '金': {

const QIANWEN = [
  // ── 大吉大利类 ──
  { text: '蛟龙得水，一飞冲天', explain: '此签主运势大开，如蛟龙入海，一切顺遂。当前是乘风破浪的最佳时机，宜主动出击，把握机遇，必能成就一番大业。' },
  { text: '紫气东来，祥云护顶', explain: '此签主福泽深厚，贵气临身。命主近期将有好消息或贵人降临，凡事主动争取，天时地利人和俱备，大展鸿图正当时。' },
  { text: '金榜题名，洞房花烛', explain: '此签主双喜临门，人生高光时刻即将到来。事业与感情同时迎来重要进展，喜上加喜，宜以感恩之心迎接美好的馈赠。' },
  { text: '风调雨顺，五谷丰登', explain: '此签主生活诸事顺遂，财运丰厚，家庭和睦，一派祥和之气。命主本年各方面皆有好收成，宜积极经营，广积善缘。' },
  { text: '乘风破浪，直挂云帆', explain: '此签主志向高远，前途无量。命主内心有强烈的目标与冲劲，此时正是扬帆启航的最佳时刻，方向坚定则前途一片光明。' },
  { text: '梅开五福，竹报平安', explain: '此签主家宅平安、五福临门。命主本年福寿财喜齐至，家人身体安康，是可以放心规划未来的美好阶段。' },
  { text: '飞龙在天，利见大人', explain: '此签主贵人现身，时机大熟。命主即将遇见对自己人生影响深远的贵人，或是工作上的伯乐，或是情感上的灵魂伴侣，要用心把握。' },
  { text: '凤鸣朝阳，百鸟来朝', explain: '此签主声名大振，四方慕名。命主的才华与德行将在近期得到广泛认可，人脉大旺，众人来归，是扩大影响力的黄金阶段。' },
  { text: '一元复始，万象更新', explain: '此签主新的开始，万物更新。命主正处于人生新阶段的起点，过去的种种已翻篇，以全新的心态迎接未来，一切充满无限可能，大好时光正在开启。' },
  { text: '泰运亨通，喜气盈门', explain: '此签主运势亨通，家门喜气充盈。命主诸事皆宜，出行吉、谈判吉、投资吉，把握当下旺盛的运势，积极行动，事半功倍。' },

  // ── 积累蓄势类 ──
  { text: '潜龙勿用，积蓄待发', explain: '此签主当下宜静不宜动，如蛰伏之龙，等待时机。眼前形势复杂，不宜贸然行动，应沉心积蓄能量，待时机成熟，一击必中。' },
  { text: '守正出奇，厚积薄发', explain: '此签主稳扎稳打方为上策。命主需在正道上坚持积累，等到积累足够深厚之时，将以令人惊叹的方式厚积薄发，成就超乎他人预料的辉煌成果。' },
  { text: '花开自有时，守得云开', explain: '此签主时机未到，静待花开。命主所期盼的目标正在酝酿成熟，无需焦虑，保持内心平静与信念，时机一到，一切将如期绽放。' },
  { text: '种瓜得瓜，前人栽树', explain: '此签主因果有报，耕耘必有收获。命主过去的努力与付出，将在未来的某个时刻以意想不到的方式返还，坚持播种善因，收获自来。' },
  { text: '韬光养晦，待时而动', explain: '此签主暂时低调，蓄势待发。当前锋芒太露反受其害，不如沉淀自身，积累实力，等待最佳出手时机，一出手便是惊天之举。' },
  { text: '老骥伏枥，志在千里', explain: '此签主雄心不减，宝刀未老。命主内心深处有远大抱负，眼前的处境不过是暂时的休整，勃勃雄心将在合适的时机再次燃起，书写传奇。' },
  { text: '卧薪尝胆，终成大器', explain: '此签主历经磨砺，终将成就。命主当前所经历的困难与磨炼，正是成大事者必经的修炼，咬牙坚持，他日必成非凡之器。' },

  // ── 哲理警示类 ──
  { text: '水善利万物而不争', explain: '此签引《道德经》之义，主以柔克刚，不争自胜。命主宜效法水之德性，谦逊处下，以包容与智慧化解矛盾，不与人争高下，却能自然处于最有利的位置。' },
  { text: '道法自然，无为而治', explain: '此签引道家至高智慧，主顺势而为。命主无需强行改变现状，应顺应天时地利人和，让事物按照自然规律发展，往往能收到意想不到的好结果。' },
  { text: '厚德载物，笃行致远', explain: '此签主品德为先，福报自来。命主当以厚道待人，积累善缘，不急功近利，一步一个脚印踏实前行，终能走出一条宽广的人生大道。' },
  { text: '修身齐家，功成名就', explain: '此签主内外兼修，方成大器。命主需从自身做起，修炼品格与能力，同时经营好家庭关系，内外兼顾，如此则事业与家庭双丰收，功名自然水到渠成。' },
  { text: '知足者富，强行者有志', explain: '此签引《道德经》之义，主知足常乐与坚定意志并行。外在之富需以内在之足为根基，方向坚定则行再远也不迷失，知足与奋进并不矛盾。' },
  { text: '曲则全，枉则直', explain: '此签主以退为进，弯路通往目标。命主眼前所走的弯路并非浪费，正是弯路中积累的见识与历练，使你最终走向比直路更坚实的成功。' },
  { text: '宠辱不惊，去留无意', explain: '此签主内心平静，不为外物所动。命主当培养处变不惊的心态，不以物喜不以己悲，如此沉稳的气度，反而会让你在变局中成为最稳健的力量。' },
  { text: '信言不美，美言不信', explain: '此签主辨别真伪，听言察行。近期命主身边可能有言语华美却不实之人，宜观其行而非信其言，真正的贵人往往言语朴实但行动有力。' },
  { text: '上善若水，处众人之所恶', explain: '此签主以谦下之道行于天下。命主愿意在别人不愿之处默默耕耘，此种低调之处积累的反而是最扎实的根基，以低处为出发点，终能到达最高处。' },

  // ── 否极泰来类 ──
  { text: '否极泰来，柳暗花明', explain: '此签主困境将过，好运即至。即便当前遭遇挑战与阻碍，切莫气馁，黑暗后必见曙光，坚持住这最后的困难时期，转机近在眼前。' },
  { text: '塞翁失马，焉知非福', explain: '此签主祸福相依，得失难料。命主当前看似是损失或遗憾的事，日后回看或许是人生最大的转机，以平常心对待得失，福报自然随之而来。' },
  { text: '山重水复疑无路，柳暗花明又一村', explain: '此签主绝境中必有转机。命主正处于最迷茫困惑之际，然而看似走投无路之时，往往是转机就在下一步的前方，坚持走出去，豁然开朗就在眼前。' },
  { text: '冬尽春来，破茧成蝶', explain: '此签主艰难将过，蜕变成美。命主正在经历的困境是破茧的必经阶段，熬过这段时光，等待你的是完全不同的精彩生命形态，蜕变即将发生。' },
  { text: '雨过天晴，虹光万丈', explain: '此签主阴霾散尽，光明大来。命主近期经历的风雨与波折即将结束，彩虹正在对面等候，清朗明媚的好运气已经在路上，耐心等待。' },
  { text: '地雷复卦，一阳来复', explain: '此签主生机复苏，否极泰来。命主的运势已触底，一阳升起，万物复苏，此后将呈现稳健向上的趋势，新的财运与机遇正在悄然积聚。' },

  // ── 感情姻缘类 ──

  { text: '鸳鸯戏水，比翼双飞', explain: '此签主感情甜蜜，伉俪情深。命主当前感情或即将迎来最甜蜜的阶段，如鸳鸯成双，携手同行，共同书写一段令人艳羡的美好故事。' },
  { text: '窈窕淑女，君子好逑', explain: '此签主美好缘分可期，真心自有回响。命主对感情真诚投入，这份真诚最能打动命中之人，缘分已在路上，保持真实的自己即是最好的吸引力。' },
  { text: '有缘千里来相会，无缘对面不相识', explain: '此签主缘分天注定，相遇皆是命。命主近期某次看似偶然的相遇，背后是冥冥中注定的缘分，用心感受生命中降临的缘分，莫让它从指间溜走。' },

  // ── 财运事业类 ──
  { text: '财源广进，日进斗金', explain: '此签主财运亨通，日进斗金。命主近期财运极旺，多方财源汇聚，无论是正财还是偏财均有进账，宜主动把握投资与合作机遇，财富将快速增长。' },
  { text: '金鸡独立，左右逢源', explain: '此签主处世灵活，左右皆宜。命主善于在各方关系中寻得最佳平衡点，处事圆融，无论在职场还是商场，都能左右逢源，广结善缘，财运随之大旺。' },
  { text: '良禽择木，贤臣择主', explain: '此签主选择比努力更重要。命主当前面临平台与方向的选择，需审时度势，选择与自己气场相合的环境与贵人，正确选择后的努力方能事半功倍。' },
  { text: '春华秋实，耕耘必获', explain: '此签主付出终有回报，努力必有收获。命主的每一分认真投入，都将在合适的时节结出丰硕的果实，不必担心回报的迟来，专注耕耘就是最好的答案。' },
  { text: '蜀道虽难，终有出头日', explain: '此签主困难虽多，前路终将通畅。命主眼前的事业道路颇为艰难，但每一步艰难跋涉都在为日后的腾飞积累高度，坚持下去，出头之日终将到来。' },

  // ── 健康平安类 ──
  { text: '福如东海，寿比南山', explain: '此签主健康长寿，福寿双全。命主身体根基深厚，注重养生则可享长寿，保持良好的作息与心态，福寿将随品德与善行而日益积累。' },
  { text: '无病无灾，岁岁平安', explain: '此签主平安是福，身心无恙。命主近期出行、健康均无大碍，只需保持规律作息，注意饮食调养，身体自然安康，平安即是最大的幸福。' },
  { text: '心宽体健，笑口常开', explain: '此签主心态决定健康。命主保持乐观开朗的心态，是最好的养生之道，内心舒展则气血通畅，命主若能减少忧虑，身体自然健康，喜乐也会相随而来。' },

  // ── 自然意象类 ──
  { text: '大鹏展翅，扶摇直上', explain: '此签主志存高远，腾飞在即。命主胸有大志，此时正是大鹏展翅的时机，借助天时之风扶摇直上，所有积累的能量将在此一飞冲天，成就非凡。' },
  { text: '明月千里，照我前程', explain: '此签主方向明朗，前路清晰。命主曾经感到迷茫的方向，正在被明月照亮，心中的疑惑将逐步消散，前行的路途越来越清晰，放心大步向前走。' },
  { text: '春风化雨，润物无声', explain: '此签主以柔和方式成就事业。命主的影响力如春风化雨，在不知不觉中感化与影响周围的人，以温润的方式成事，比强硬更能持久，且赢得人心。' },
  { text: '松柏后凋，浩然正气', explain: '此签主命主本性如松柏，历经磨难而不改其志。无论外界如何变化，坚守内心的正气与原则，这份浩然之气正是命主最宝贵的精神资产。' },
  { text: '竹节虚心，梅骨傲雪', explain: '此签主谦虚中含傲骨，正是命主的人格特征。虚心向学不自满，面对压力与困境时却傲然挺立，此种品格使命主无论身处何境，皆受人敬重。' },
  { text: '海纳百川，有容乃大', explain: '此签主宽容包容是最大的格局。命主若能以海洋般的胸怀容纳不同的人与意见，必能集众人之力成就大事，格局越大，吸引的资源与机遇也越大。' },
  { text: '雁过留声，人过留名', explain: '此签主重视名誉与口碑。命主所到之处皆应留下好名声，口碑是无形的财富，良好声誉积累足够厚实，贵人自然闻名而来，财运与机遇随之而至。' },
  { text: '长风破浪，济沧海', explain: '此签主壮志凌云，勇往直前。命主有能力越过眼前所有的波折与障碍，志向所在，长风可借，扬帆远航，终将抵达心中那片理想的彼岸。' },

  // ── 谨慎警示类 ──

// 大运推算辅助
function getDaYun(data, pillars) {
  const age = new Date().getFullYear() - data.year;
  const results = [];
  for (let i = 0; i < 5; i++) {
    const startAge = 8 + i * 10;
    const endAge = startAge + 9;
    const si = (pillars[1].si + (data.gender === 'male' ? 1 : -1) * (i + 1) * 2 + 100) % 10;
    const bi = (pillars[1].bi + (data.gender === 'male' ? 1 : -1) * (i + 1) * 2 + 120) % 12;
    const startYear = data.year + startAge;
    const isCurrent = age >= startAge && age <= endAge;
    results.push({ stem: STEMS[si], branch: BRANCHES[bi], startAge, endAge, startYear, isCurrent, si, bi });
  }
  return results;
}

// 六爻问卦：问题类型关键词识别
function detectQuestionType(q) {
  if (/财|钱|投资|生意|股|基金|项目|收入|借|贷|合同|合同|买|卖/.test(q)) return 'wealth';
  if (/工作|事业|升职|晋升|职位|创业|上司|同事|业务|项目|跳槽/.test(q)) return 'career';
  if (/感情|爱情|婚姻|恋爱|对象|男友|女友|分手|追|暗恋|结婚|离婚/.test(q)) return 'love';
  if (/健康|病|身体|医|手术|检查|疗|养|康/.test(q)) return 'health';
  return 'general';
}

// 动爻数量说明
function movingDesc(count) {
  if (count === 0) return '本卦无动爻，卦象稳定，以本卦卦辞为准判断。';
  if (count === 1) return '一爻动，力量集中，以该动爻爻辞为断事核心，指向清晰。';
  if (count === 2) return '二爻动，以上爻为主，变卦为辅，可见近期走势之变化。';
  if (count === 3) return '三爻动，动静各半，以本卦上卦与变卦下卦综合判断。';
  if (count === 4) return '四爻动，以变卦下两爻为断，变化居主导，格局将大转。';
  if (count === 5) return '五爻动，以变卦唯一不动爻为核心，变化彻底，须顺势而为。';
  return '六爻皆动，乾坤互变，大吉大凶各有所主，以变卦卦辞为最终裁断。';
}

// 渲染一根爻的HTML（含动爻样式）
function renderLine(lineVal, lineNum) {
  const isYang = lineVal === 7 || lineVal === 9;
  const isMoving = lineVal === 6 || lineVal === 9;
  const movingClass = isMoving ? (isYang ? ' hex-moving-yang' : ' hex-moving-yin') : '';
  const marker = isMoving ? `<span class="hex-line-marker">${lineVal === 9 ? '○' : '×'}</span>` : `<span class="hex-line-marker" style="opacity:0">·</span>`;
  if (isYang) {
    return `<div class="hex-line${movingClass}">${marker}<div class="hex-line-yang"></div></div>`;
  } else {
    return `<div class="hex-line${movingClass}">${marker}<div class="hex-line-yin"><span></span><span></span></div></div>`;
  }
}

// 从6根爻值（6/7/8/9）计算本卦/变卦，生成完整解读HTML
function castAndRender(question, seed) {
  // 生成6根爻值（底→顶）
  const rand = seededRand(seed);
  const lineVals = Array.from({length:6}, () => {
    // 模拟三枚铜钱：正=3,背=2；老阳=9(3+3+3)，少阴=8(3+3+2 or 3+2+2 no)
    // 实际: 三枚各自 正(3)背(2): 总6=老阴,7=少阳,8=少阴,9=老阳
    const coins = [rand()<0.5?3:2, rand()<0.5?3:2, rand()<0.5?3:2];
    return coins[0]+coins[1]+coins[2];
  });

  // 计算上下卦二进制（阳=1, 阴=0，底→顶）
  const toBit = v => (v===7||v===9) ? 1 : 0;
  const lowerBits = (toBit(lineVals[2])<<2) | (toBit(lineVals[1])<<1) | toBit(lineVals[0]);
  const upperBits = (toBit(lineVals[5])<<2) | (toBit(lineVals[4])<<1) | toBit(lineVals[3]);

  const hexNum = HEXAGRAM_TABLE[(upperBits << 3) | lowerBits];
  const hex = HEXAGRAMS[hexNum];
  const upperTri = TRIGRAM_INFO[upperBits];
  const lowerTri = TRIGRAM_INFO[lowerBits];

  // 变卦（将动爻取反）
  const changedVals = lineVals.map(v => v===6?7 : v===9?8 : v);
  const cLowerBits = (toBit(changedVals[2])<<2) | (toBit(changedVals[1])<<1) | toBit(changedVals[0]);
  const cUpperBits = (toBit(changedVals[5])<<2) | (toBit(changedVals[4])<<1) | toBit(changedVals[3]);
  const changeHexNum = HEXAGRAM_TABLE[(cUpperBits << 3) | cLowerBits];
  const changeHex = HEXAGRAMS[changeHexNum];
  const hasChange = lineVals.some(v => v===6||v===9);

  const movingLines = lineVals.map((v,i)=>({v,i:i+1})).filter(x=>x.v===6||x.v===9);
  const qType = detectQuestionType(question);
  const favStars = n => '★'.repeat(n) + '☆'.repeat(5-n);

  // 动爻爻辞
  const yaoHtml = movingLines.length > 0 ? movingLines.map(ml => {
    const key = `${hexNum}-${ml.i}`;
    const yaoText = YAO_TEXTS[key] || `第${ml.i}爻动（${ml.v===9?'老阳':'老阴'}）：此爻变动，${ml.v===9?'阳极转阴，旺极防衰，把握当下盛时，及时收获成果。':'阴极转阳，否极泰来，坚持到底必见转机，新的开始即将到来。'}`;
    return `<div class="liuyao-yao-item moving"><div class="yao-num">第${ml.i}爻动 · ${ml.v===9?'老阳变阴':'老阴变阳'}</div>${yaoText}</div>`;
  }).join('') : `<div class="liuyao-yao-item"><div class="yao-num">卦象稳定</div>六爻皆静，无爻变动，卦象稳固持久，以本卦整体卦义直接判断，结果较为确定明朗。</div>`;

  // 对问题类型的针对性解读
  const contextAnswer = hex[qType] || hex.general;
  const changeContext = hasChange ? (changeHex[qType] || changeHex.general) : '';

  // 星级映射
  const favMap = { 5:'大吉', 4:'吉', 3:'平', 2:'凶', 1:'大凶' };

  return `
    <div class="liuyao-result">
      <div class="analysis-card" style="margin-bottom:16px">
        <div class="analysis-card-title"><span class="icon">◉</span> 卦象揭示</div>
        <div class="hexagram-pair">
          <div class="hexagram-box primary">
            <div class="hexagram-label">本　卦</div>
            <div class="hexagram-name">${hex.name}</div>
            <div class="hex-lines">
              ${[5,4,3,2,1,0].map(i=>renderLine(lineVals[i], i+1)).join('')}
            </div>
            <div style="margin-top:10px;font-size:0.75rem;color:var(--text-dim)">${upperTri.symbol}${upperTri.name} / ${lowerTri.symbol}${lowerTri.name}</div>
            <div class="hexagram-fav">${favStars(hex.fav)}</div>
            <div class="hexagram-keyword">${hex.key}</div>
          </div>
          ${hasChange ? `
          <div class="hexagram-box">
            <div class="hexagram-label">变　卦</div>
            <div class="hexagram-name">${changeHex.name}</div>
            <div class="hex-lines">
              ${[5,4,3,2,1,0].map(i=>renderLine(changedVals[i], i+1)).join('')}
            </div>
            <div style="margin-top:10px;font-size:0.75rem;color:var(--text-dim)">${TRIGRAM_INFO[cUpperBits].symbol}${TRIGRAM_INFO[cUpperBits].name} / ${TRIGRAM_INFO[cLowerBits].symbol}${TRIGRAM_INFO[cLowerBits].name}</div>
            <div class="hexagram-fav">${favStars(changeHex.fav)}</div>
            <div class="hexagram-keyword">${changeHex.key}</div>
          </div>` : ''}
        </div>
        <p style="color:var(--text-dim);font-size:0.82rem;text-align:center;margin-top:8px">
          ${movingDesc(movingLines.length)}
        </p>
      </div>

      <div class="analysis-card" style="margin-bottom:16px">
        <div class="analysis-card-title"><span class="icon">◈</span> 动爻解析</div>
        <div class="liuyao-yao-list">${yaoHtml}</div>
      </div>

      <div class="analysis-card">
        <div class="analysis-card-title"><span class="icon">☰</span> 断事指南</div>
        <p style="color:var(--text-dim);font-size:0.82rem;margin-bottom:12px">所问：「${question}」</p>
        <div class="liuyao-answer">
          <strong>【${hex.name}】${favMap[hex.fav]}象</strong> — ${hex.general}
          <br><br>
          <strong>针对所问</strong>：${contextAnswer}
          ${hasChange ? `<br><br><strong>【${changeHex.name}变卦指引】</strong>：${changeContext}` : ''}
        </div>
      </div>
    </div>
  `;
}

// 点击"起卦"的交互动作
function liuyaoCast(baseSeed) {
  const q = document.getElementById('liuyao-q').value.trim();
  if (!q) { alert('请先写下您想问的事情'); return; }

  // 将问题内容混入seed，使不同问题得到不同结果
  const qHash = [...q].reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0, 0);
  const timeSeed = Date.now() % 86400000; // 用当天时间增加随机性
  const finalSeed = Math.abs(baseSeed + qHash + timeSeed);

  const area = document.getElementById('liuyao-result-area');
  area.innerHTML = `
    <div class="analysis-card" style="text-align:center;padding:28px">
      <p style="color:var(--gold);margin-bottom:18px;letter-spacing:.08em">正在摇卦，请诚心静候……</p>
      <div class="coins-wrap">
        <div class="coin">阳</div>
        <div class="coin">阴</div>
        <div class="coin">阳</div>
      </div>
      <p style="color:var(--text-dim);font-size:0.82rem">三枚铜钱六次落定，卦象生成中……</p>
    </div>
  `;
  area.scrollIntoView({ behavior:'smooth', block:'nearest' });

  setTimeout(() => {
    area.innerHTML = castAndRender(q, finalSeed);
  }, 1600);
}

// 预计算所有跨模块共享数据，保证各模块数据不矛盾
function buildShared(seed, pillars) {
  const rand = seededRand(seed + 997);

  // 命主命局主导五行（财运/事业/贵人属相等共用同一判断）
  const elemCnt = { '木':0,'火':0,'土':0,'金':0,'水':0 };
  pillars.forEach(p => { elemCnt[STEM_ELEM[p.si]]++; elemCnt[BRANCH_ELEM[p.bi]]++; });
  const domElem = Object.entries(elemCnt).sort((a,b) => b[1]-a[1])[0][0];
  const wGuiren = WEALTH_GUIREN[domElem];
  // 贵人属相文字（财运/事业模块统一）
  const benefactorZodiac = wGuiren.shuxiang.map(s => s.split('（')[0].replace('属','')).join('、');

  // 十二月财运星级（财运模块与年运模块共用同一组数据）
  const wealthMonthStars = Array.from({length: 12}, () => Math.floor(rand() * 3) + 3);

  // 财运最旺的三个月（用于各模块文字引用）
  const bestWealthMonths = wealthMonthStars
    .map((s, i) => ({ s, m: i + 1 }))
    .sort((a, b) => b.s - a.s)
    .slice(0, 3)
    .map(x => x.m)
    .sort((a, b) => a - b);

  // 事业关键月份（独立计算，与财运月份不同但同样确定）
  const careerMonthStars = Array.from({length: 12}, () => Math.floor(rand() * 3) + 3);
  const bestCareerMonths = careerMonthStars
    .map((s, i) => ({ s, m: i + 1 }))
    .sort((a, b) => b.s - a.s)
    .slice(0, 3)
    .map(x => x.m)
    .sort((a, b) => a - b);

  // 未来十年年运星级
  const currentYear = new Date().getFullYear();
  const yearStars = {};
  for (let y = currentYear - 1; y <= currentYear + 9; y++) {
    yearStars[y] = Math.floor(rand() * 3) + 3;
  }

  return { domElem, wGuiren, benefactorZodiac, wealthMonthStars, bestWealthMonths, careerMonthStars, bestCareerMonths, yearStars };
}

function calculate() {
  const name = document.getElementById('name').value.trim() || '匿名命主';
  const gender = document.getElementById('gender').value;
  const dateStr = document.getElementById('birthDate').value;
  const hour = parseInt(document.getElementById('birthHour').value);
  const place = document.getElementById('birthPlace').value.trim();

  if (!dateStr) { alert('请选择出生日期'); return; }

  const [year, month, day] = dateStr.split('-').map(Number);

  // 计算八字
  const yp = getYearPillar(year);
  const mp = getMonthPillar(year, month);
  const dp = getDayPillar(year, month, day);
  const hp = getHourPillar(dp.si, hour);
  const pillars = [yp, mp, dp, hp];

  const zodiacIdx = ((year - 4) % 12 + 12) % 12;
  const zodiac = ZODIAC[zodiacIdx];

  const elemCnt = countElements(pillars);

  const data = { name, gender, year, month, day, hour, place, zodiac };

  // 基于生日的seed
  const seed = year * 10000 + month * 100 + day + hour * 7 + (gender === 'male' ? 0 : 13);
  const rand = seededRand(seed);

  document.getElementById('inputCard').style.display = 'none';
  document.getElementById('loading').classList.add('show');

  setTimeout(() => {
    document.getElementById('loading').classList.remove('show');

    // 渲染表头
    document.getElementById('resultHeader').innerHTML = `
      <div class="result-name">${name}</div>
      <div class="result-meta">
        ${year}年${month}月${day}日 · ${BRANCHES[HOUR_BRANCH[hour]]}时 · ${zodiac}年 · ${gender === 'male' ? '男命' : '女命'}
        ${place ? ' · ' + place : ''}
      </div>
      <div class="bazi-display">
        ${pillars.map((p, i) => `
          <div class="pillar">
            <div class="pillar-label">${['年','月','日','时'][i]}柱</div>
            <div class="pillar-stem ${ELEM_COLOR[STEM_ELEM[p.si]]}">${p.stem}</div>
            <div class="pillar-branch ${ELEM_COLOR[BRANCH_ELEM[p.bi]]}">${p.branch}</div>
          </div>`).join('')}
      </div>
    `;

    // 渲染各模块
    const r1 = seededRand(seed + 1), r2 = seededRand(seed + 2),
          r3 = seededRand(seed + 3), r4 = seededRand(seed + 4),
          r5 = seededRand(seed + 5), r6 = seededRand(seed + 6),
          r7 = seededRand(seed + 7), r8 = seededRand(seed + 8);

    // 预计算共享数据，确保各模块月运/年运数据完全一致，避免矛盾
    const shared = buildShared(seed, pillars);

    document.getElementById('tab-bazi').innerHTML = renderBazi(data, pillars, elemCnt, r1);
    document.getElementById('tab-face').innerHTML = renderFace(data, pillars, r2);
    document.getElementById('tab-fengshui').innerHTML = renderFengshui(data, pillars, elemCnt, r3);
    document.getElementById('tab-wealth').innerHTML = renderWealth(data, pillars, r4, shared);
    document.getElementById('tab-career').innerHTML = renderCareer(data, pillars, r5, shared);
    document.getElementById('tab-love').innerHTML = renderLove(data, pillars, r6);
    document.getElementById('tab-health').innerHTML = renderHealth(data, pillars, elemCnt, r7);
    document.getElementById('tab-yearly').innerHTML = renderYearly(data, pillars, r8, shared);
    document.getElementById('tab-liuyao').innerHTML = renderLiuyao(data, pillars);

    document.getElementById('results').classList.add('show');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
  }, 2200);
}

function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
}

function reset() {
  document.getElementById('results').classList.remove('show');
  document.getElementById('inputCard').style.display = '';
  document.querySelector('.input-card').scrollIntoView({ behavior: 'smooth' });
  // reset tabs
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-bazi').classList.add('active');
  document.querySelectorAll('.tab-btn').forEach((b, i) => { b.classList.toggle('active', i === 0); });
}

// ============================================================
//  星空动画
// ============================================================
(function initStars() {
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createStars() {
    stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.3,
        a: Math.random(),
        da: (Math.random() - 0.5) * 0.005,
        speed: Math.random() * 0.15 + 0.05,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      s.a += s.da;
      if (s.a <= 0 || s.a >= 1) s.da *= -1;
      s.y += s.speed;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,168,76,${s.a * 0.7})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); createStars(); });
  resize(); createStars(); draw();
})();
</script>
